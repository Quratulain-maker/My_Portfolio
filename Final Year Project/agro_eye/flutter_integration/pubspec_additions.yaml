# ============================================
# PUBSPEC.YAML ADDITIONS
# Add these to your existing pubspec.yaml
# ============================================

# Add these dependencies under 'dependencies:':

dependencies:
  flutter:
    sdk: flutter
  
  # TensorFlow Lite for ML inference
  tflite_flutter: ^0.11.0
  
  # Image handling
  image_picker: ^1.0.7
  image: ^4.1.7
  
  # Permissions (for camera)
  permission_handler: ^11.3.0


# Add this at the end of pubspec.yaml:

flutter:
  uses-material-design: true
  
  assets:
    - assets/ml/plant_disease_model.tflite
    - assets/ml/labels.txt
    - assets/ml/model_metadata.json
